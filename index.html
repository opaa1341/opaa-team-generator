<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OPAA ALLIANCE - Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e1b4b, #0b1120);
      color: white;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* Glow background effects (Matching Generator) */
    body::before, body::after {
      content: "";
      position: fixed;
      width: 300px;
      height: 300px;
      filter: blur(80px);
      z-index: -1;
      opacity: 0.4;
    }
    body::before { background: #7c3aed; top: -50px; left: -50px; }
    body::after { background: #3b82f6; bottom: -80px; right: -80px; }

    /* Navigation Bar - Perpendicular and Sticky */
    nav {
      width: 95%;
      max-width: 1200px;
      margin: 20px auto;
      padding: 15px 25px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 20px;
      z-index: 1000;
      box-sizing: border-box;
    }

    .logo {
      font-weight: 800;
      font-size: 18px;
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
    }

    .nav-links a {
      color: #cbd5e1;
      text-decoration: none;
      margin-left: 15px;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      transition: 0.3s;
    }

    .nav-links a:hover { color: #60a5fa; }

    /* Main Container */
    .container {
      width: 95%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0;
      box-sizing: border-box;
      text-align: center;
    }
